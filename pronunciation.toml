# DCS Kneeboard TTS pronunciation overrides.
#
# Each key is matched against the source text as a whole word (case-sensitive)
# and replaced with the value before TTS synthesis. Use this to fix
# mispronunciations of aviation abbreviations and acronyms.
#
# Tips:
#   - "P W R" with spaces makes the synthesizer spell letters out.
#   - Use natural-language phonetic spellings ("Flickus", "Eggy", "Rower").
#   - You can edit this file and restart the app to apply changes.

[abbreviations]
# Power / electrical
PWR = "POWER"
EPU = "E P U"
PMG = "P M G"
GEN = "Gen"

# FLCS / flight controls
FLCS = "Flickus"
JFS = "J F S"
RLY = "Relay"

