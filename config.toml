# Static infrastructure config for DCS Kneeboard.
#
# Defines which aircraft exist and which tabs are loaded.
# (Runtime user state — toggles, window position, current aircraft, last tab —
# lives in settings.toml.)

# Aircraft modules. The id matches the DCS folder name so {aircraft} placeholders
# in tab paths resolve correctly. Label is what the picker shows.
[[aircraft]]
id = "F-16C_50"
label = "F-16C Viper"

[[aircraft]]
id = "A-10C_2"
label = "A-10C Warthog"

[[aircraft]]
id = "FA-18C_hornet"
label = "F/A-18C Hornet"

[[aircraft]]
id = "AH-64D_BLK_II"
label = "AH-64D Apache"


# Tabs. Order is rendered top-to-bottom in the left strip.
#
# Source kinds:
#   generator       — kneeboards generator output (PNG + sidecar JSON), full
#                     item-level nav + TTS. Path supports {aircraft}.
#   image_folder    — raw images, page-level nav only, no TTS.
#   dcs_kneeboards  — resolves to %USERPROFILE%/Saved Games/DCS/Kneeboard/{aircraft}/
#                     (falls back to DCS.openbeta). Override the base path here
#                     if you keep DCS Saved Games elsewhere.

[[tabs]]
id = "checklists"
label = "Generated Checklists"
icon = "clipboard-list"
source.kind = "generator"
source.path = "pages-sample"   # change to "C:/.../kneeboards/output/{aircraft}" once aircraft-aware

[[tabs]]
id = "dcs"
label = "DCS Kneeboards"
icon = "plane"
source.kind = "dcs_kneeboards"
# source.base = "D:/Steam/SavedGames/DCS/Kneeboard"   # override if DCS is non-default

# Example ImageFolder tab — uncomment and point at a folder of charts/maps:
# [[tabs]]
# id = "charts"
# label = "Charts"
# icon = "map"
# source.kind = "image_folder"
# source.path = "C:/Users/anpea/Documents/DCS-Charts/{aircraft}"
# source.recursive = false


# STT accuracy knobs (issue #15). All three sections are optional —
# leaving the block empty restores pre-#15 routing behaviour. See
# CLAUDE.md `## STT accuracy knobs` for the full mental model.

[stt]
# Always-on vocabulary terms. Joined into Whisper's initial_prompt so
# decoding biases toward these spellings rather than plausible-sounding
# homophones ("HARM" stays "HARM" instead of becoming "home").
vocabulary = [
    "HARM", "AGM-65", "AGM-88", "AIM-9", "AIM-120", "AMRAAM",
    "JDAM", "JSOW", "Maverick", "Sidewinder",
    "FCR", "HMCS", "JHMCS", "HUD", "MFD", "RWR", "TGP",
]
# Jaro-Winkler similarity threshold for the voice router's fuzzy
# fallback. Only fires after the substring + classify passes both
# miss, so it can't clobber hand-tuned phrase ordering. 0.85 catches
# "nest" / "nect" → "next" without spuriously routing unrelated text.
fuzzy_threshold = 0.85

# Per-aircraft additions, merged on top of `vocabulary` when that
# aircraft becomes active. A fresh initial_prompt is pushed to the
# STT worker on every aircraft switch — no restart required.
[stt.per_aircraft]
"F-16C_50" = ["HTS", "JSOW", "Maverick", "Sniper"]
"A-10C_2"  = ["GAU-8", "Hydra", "Mk-82", "TGP"]
"FA-18C_hornet" = ["AGM-84", "Harpoon", "ATFLIR"]
"AH-64D_BLK_II" = ["TADS", "Hellfire", "Hydra"]

# Post-STT rewrites applied to the raw transcript before voice
# routing. Matching is case-insensitive, word-boundary, longest-key-
# first so "jay dam" beats "jay" if both are listed.
[stt.corrections]
"home" = "HARM"
"jay dam" = "JDAM"
"jay sow" = "JSOW"
"f c r" = "FCR"
"h c m s" = "HMCS"
